<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Circling Logistics Platform</title>
    <link rel="stylesheet" href="design-system-european.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-800) 100%);
            padding: var(--space-6);
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-8);
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-2xl);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        
        .login-logo {
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            color: var(--primary-600);
            margin-bottom: var(--space-4);
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            font-size: var(--font-size-base);
        }
        
        .social-login {
            margin-bottom: var(--space-6);
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-3);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-base);
            background: var(--white);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
            transition: all 0.2s ease-in-out;
            gap: var(--space-3);
        }
        
        .social-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--border-secondary);
        }
        
        .divider {
            position: relative;
            text-align: center;
            margin: var(--space-6) 0;
            color: var(--text-muted);
            font-size: var(--font-size-sm);
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-primary);
            z-index: 1;
        }
        
        .divider span {
            background: var(--white);
            padding: 0 var(--space-4);
            position: relative;
            z-index: 2;
        }
        
        .forgot-password {
            text-align: center;
            margin-top: var(--space-6);
        }
        
        .forgot-password a {
            color: var(--primary-600);
            text-decoration: none;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .signup-link {
            text-align: center;
            margin-top: var(--space-8);
            padding-top: var(--space-6);
            border-top: 1px solid var(--border-primary);
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
        }
        
        .signup-link a {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        .form-group {
            margin-bottom: var(--space-5);
        }
        
        .password-toggle {
            position: relative;
        }
        
        .password-toggle button {
            position: absolute;
            right: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: var(--space-2);
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-6);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        
        .checkbox-group label {
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">Circling</div>
                <p class="login-subtitle">Welcome back to your logistics platform</p>
            </div>
            
            <!-- Social Login Options -->
            <div class="social-login">
                <a href="#" class="social-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </a>
                
                <a href="#" class="social-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </a>
            </div>
            
            <div class="divider">
                <span>or sign in with email</span>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label required">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-control" 
                        placeholder="Enter your email address"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label required">Password</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" onclick="togglePassword()" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="remember-me">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="forgot-password-step1.html" class="text-sm">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    Sign In
                </button>
            </form>
            
            <div class="signup-link">
                Don't have an account? 
                <a href="04-register-european.html">Create one now</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Basic validation
            if (!email || !password) {
                alert('Please fill in all required fields.');
                return;
            }
            
            // Simulate login process
            alert('Login functionality would be implemented here. Redirecting to dashboard...');
            
            // Redirect based on user type (this would be determined by backend)
            // For demo purposes, redirect to cargo owner dashboard
            window.location.href = '02-dashboard-european.html';
        });
        
        // Form validation
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        
        emailInput.addEventListener('blur', function() {
            const email = this.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email && !emailRegex.test(email)) {
                this.classList.add('error');
                let errorMsg = this.parentNode.querySelector('.form-error');
                if (!errorMsg) {
                    errorMsg = document.createElement('div');
                    errorMsg.className = 'form-error';
                    this.parentNode.appendChild(errorMsg);
                }
                errorMsg.textContent = 'Please enter a valid email address.';
            } else {
                this.classList.remove('error');
                const errorMsg = this.parentNode.querySelector('.form-error');
                if (errorMsg) {
                    errorMsg.remove();
                }
            }
        });
        
        passwordInput.addEventListener('blur', function() {
            const password = this.value;
            
            if (password && password.length < 6) {
                this.classList.add('error');
                let errorMsg = this.parentNode.querySelector('.form-error');
                if (!errorMsg) {
                    errorMsg = document.createElement('div');
                    errorMsg.className = 'form-error';
                    this.parentNode.appendChild(errorMsg);
                }
                errorMsg.textContent = 'Password must be at least 6 characters long.';
            } else {
                this.classList.remove('error');
                const errorMsg = this.parentNode.querySelector('.form-error');
                if (errorMsg) {
                    errorMsg.remove();
                }
            }
        });
    </script>
</body>
</html>
